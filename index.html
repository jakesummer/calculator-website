<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="calculator">
        <div class="displays">
            <div class="equation-display"></div>
            <div class="current-display"></div>
        </div>
        
        <div class="buttons">
            <div class="left-buttons">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button id="clear-button">AC</button>
                <button>0</button>
                <button id="delete-button">⌫</button>
            </div>
            <div class="operator-buttons">
                <button>+</button>
                <button>-</button>
                <button>x</button>
                <button>÷</button>
                <button>=</button>
            </div>
        </div>
    </div>
</body>
</html>
