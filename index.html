<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <script src="script.js" defer></script>
</head>
<body>
    <div class="buttons">
        <div class="displays">
            <div class="equation-display"></div>
            <div class="current-display"></div>
        </div>

        <div class="digit-buttons">
            <button>0</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
        </div>
        <button id="clear-button">clear</button>
        <div class="operator-buttons">
            <button>+</button>
            <button>-</button>
            <button>x</button>
            <button>÷</button>
            <button>=</button>
        </div>
    </div>
</body>
</html>
